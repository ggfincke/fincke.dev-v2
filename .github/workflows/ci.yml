name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun ci
      - run: bun run ci:check

  browser:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun ci
      - run: bunx playwright install --with-deps chromium
      - run: bun run build
      - name: Run browser route checks
        run: |
          bun run preview -- --host 127.0.0.1 --port 4173 --strictPort &
          preview_pid=$!
          trap "kill $preview_pid" EXIT
          BASE_URL=http://127.0.0.1:4173 bun run browser:check
      - name: Upload browser verification artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-verification-artifacts
          path: |
            reports/
            screenshots/smoke/
          if-no-files-found: ignore
