name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run ci:check

  browser:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run browser route checks
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 --strictPort &
          preview_pid=$!
          trap "kill $preview_pid" EXIT
          BASE_URL=http://127.0.0.1:4173 npm run browser:check
      - name: Upload browser verification artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-verification-artifacts
          path: |
            reports/
            screenshots/smoke/
          if-no-files-found: ignore
