name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify tag is reachable from main
        run: |
          git fetch --prune origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD origin/main

      - run: npm ci
      - run: npm run ci:check

      - name: Promote stable release to prod branch
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          git fetch --prune origin +refs/heads/prod:refs/remotes/origin/prod || true
          if git show-ref --verify --quiet refs/remotes/origin/prod; then
            git merge-base --is-ancestor origin/prod HEAD
          fi
          git push origin HEAD:refs/heads/prod

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract release notes from changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > release-notes.md
          echo "" >> release-notes.md
          echo "**Full Changelog**: https://github.com/ggfincke/fincke.dev-v2/commits/v$VERSION" >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
