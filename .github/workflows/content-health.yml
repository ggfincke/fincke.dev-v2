name: Content Health

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  content-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run content:health
