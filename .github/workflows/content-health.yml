name: Content Health

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  content-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun ci
      - run: bun run typecheck
      - run: bun run content:health
